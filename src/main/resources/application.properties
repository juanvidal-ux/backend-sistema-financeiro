spring.application.name=sistemacompras
# URL de Conexão com o Banco de Dados
# (use "sistema_compras" que criamos)
spring.datasource.url=jdbc:mysql://localhost:3306/sistema_compras

# Credenciais do Banco
spring.datasource.username=root
spring.datasource.password=123456

# Configurações do Hibernate (JPA)
# "validate" verifica se as tabelas existem, mas não as cria/altera.
# "update" atualiza o schema (bom para desenvolvimento).
# "create" apaga e recria tudo (perde os dados).
# Vamos usar "validate" pois já criamos as tabelas manualmente.
spring.jpa.hibernate.ddl-auto=update

# Mostra os comandos SQL no console (ótimo para debug)
spring.jpa.show-sql=true
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration
